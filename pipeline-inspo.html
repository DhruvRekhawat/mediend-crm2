<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lead Source Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F2F2F7;
  --surface: rgba(255,255,255,0.85);
  --surface-solid: #FFFFFF;
  --surface2: #F2F2F7;
  --border: rgba(60,60,67,0.12);
  --border2: rgba(60,60,67,0.06);
  --accent: #007AFF;
  --accent-light: rgba(0,122,255,0.10);
  --accent-mid: rgba(0,122,255,0.18);
  --green: #34C759;
  --red: #FF3B30;
  --orange: #FF9500;
  --purple: #AF52DE;
  --teal: #5AC8FA;
  --indigo: #5856D6;
  --text: #1C1C1E;
  --text2: #3A3A3C;
  --muted: #8E8E93;
  --muted2: #AEAEB2;
  --separator: rgba(60,60,67,0.13);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
  font-size: 13px;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
.app { display: flex; flex-direction: column; height: 100vh; }

/* HEADER */
header {
  padding: 0 28px;
  height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(255,255,255,0.72);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid var(--separator);
  flex-shrink: 0;
  position: sticky; top: 0; z-index: 100;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon {
  width: 32px; height: 32px;
  background: var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  box-shadow: 0 2px 8px rgba(0,122,255,.28);
}
.logo h1 {
  font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: -0.3px;
}
.logo p { color: var(--muted); font-size: 11px; font-weight: 400; margin-top: 1px; }
.hstats { display: flex; gap: 24px; }
.hstat { text-align: right; }
.hstat-val { font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
.hstat-label { color: var(--muted); font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.4px; }

/* LAYOUT */
.main { display: flex; flex: 1; overflow: hidden; }

/* SIDEBAR */
.sidebar {
  width: 248px; flex-shrink: 0;
  background: rgba(242,242,247,0.95);
  backdrop-filter: blur(20px);
  border-right: 1px solid var(--separator);
  overflow-y: auto; padding: 12px 8px;
}
.sidebar::-webkit-scrollbar { width: 0; }
.sidebar-title {
  font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
  text-transform: uppercase; color: var(--muted);
  padding: 4px 10px 8px; margin-top: 4px;
}
.circle-header {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px; cursor: pointer; border-radius: 10px;
  transition: background .15s; user-select: none;
}
.circle-header:hover { background: rgba(0,0,0,.04); }
.cdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.cname { font-size: 13px; font-weight: 600; color: var(--text2); flex: 1; }
.ccount {
  font-size: 11px; font-weight: 600; color: var(--muted);
  background: rgba(120,120,128,.12); border-radius: 8px; padding: 1px 7px;
}
.ctog { color: var(--muted2); font-size: 10px; }
.circle-campaigns { overflow: hidden; max-height: 0; transition: max-height .3s ease; }
.circle-campaigns.open { max-height: 900px; }
.cbtn {
  width: 100%; text-align: left; background: transparent; border: none;
  border-radius: 10px; padding: 8px 10px 8px 24px;
  cursor: pointer; color: var(--text2); font-family: inherit;
  font-size: 12.5px; font-weight: 400; line-height: 1.4;
  transition: all .15s; display: flex; align-items: center;
  justify-content: space-between; gap: 6px;
}
.cbtn:hover { background: rgba(0,0,0,.04); }
.cbtn.active {
  background: var(--accent); color: #fff;
  box-shadow: 0 2px 10px rgba(0,122,255,.25);
}
.cbtn-name { flex: 1; }
.cbtn-count { font-size: 11px; font-weight: 600; color: var(--accent); flex-shrink: 0; }
.cbtn.active .cbtn-count { color: rgba(255,255,255,.8); }

/* CONTENT */
.content { flex: 1; overflow-y: auto; padding: 24px 28px; background: var(--bg); }
.content::-webkit-scrollbar { width: 6px; }
.content::-webkit-scrollbar-track { background: transparent; }
.content::-webkit-scrollbar-thumb { background: var(--muted2); border-radius: 3px; }

@keyframes fadeUp { from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);} }
.animate { animation: fadeUp .25s ease; }

.section-title { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 4px; }
.section-sub { color: var(--muted); font-size: 13px; margin-bottom: 22px; }

/* OVERVIEW CARDS */
.ov-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
.ov-card {
  background: var(--surface-solid);
  border-radius: 14px; padding: 16px 18px;
  cursor: pointer; transition: all .2s;
  box-shadow: 0 1px 4px rgba(0,0,0,.06), 0 4px 14px rgba(0,0,0,.04);
}
.ov-card:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,.1); }
.ov-circle { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); margin-bottom: 3px; }
.ov-name { font-size: 12.5px; font-weight: 600; color: var(--text); margin-bottom: 10px; line-height: 1.35; }
.ov-total { font-size: 28px; font-weight: 700; letter-spacing: -0.8px; }
.ov-label { font-size: 10px; color: var(--muted); font-weight: 500; }
.ov-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 11px; overflow: hidden; }
.ov-bar-fill { height: 100%; border-radius: 2px; transition: width .6s ease; }

/* BACK BTN */
.back-btn {
  display: inline-flex; align-items: center; gap: 4px;
  background: transparent; border: none;
  color: var(--accent); cursor: pointer; font-size: 13px;
  font-weight: 500; font-family: inherit; margin-bottom: 16px;
  padding: 4px 0; transition: opacity .15s;
}
.back-btn:hover { opacity: 0.7; }

/* CAMPAIGN HEADER */
.camp-header {
  background: var(--surface-solid);
  border-radius: 16px; padding: 20px 22px;
  margin-bottom: 20px;
  box-shadow: 0 1px 4px rgba(0,0,0,.05), 0 4px 16px rgba(0,0,0,.04);
  display: flex; align-items: flex-start; justify-content: space-between; gap: 16px;
}
.camp-eyebrow {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.5px; color: var(--muted); margin-bottom: 4px;
  display: flex; align-items: center; gap: 6px;
}
.camp-title { font-size: 18px; font-weight: 700; letter-spacing: -0.4px; margin-bottom: 8px; color: var(--text); }
.camp-meta { display: flex; gap: 8px; flex-wrap: wrap; }
.mtag {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--surface2); border-radius: 20px; padding: 3px 10px;
  font-size: 11px; font-weight: 500; color: var(--text2);
}
.camp-total-num { font-size: 36px; font-weight: 700; letter-spacing: -1px; color: var(--accent); text-align: right; }
.camp-total-label { color: var(--muted); font-size: 11px; font-weight: 500; text-align: right; }

/* STATUS CARDS */
.stat-summary { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin-bottom: 22px; }
.stat-card {
  background: var(--surface-solid); border-radius: 14px;
  padding: 14px 16px; transition: all .15s;
  box-shadow: 0 1px 3px rgba(0,0,0,.05), 0 2px 10px rgba(0,0,0,.03);
}
.stat-card:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,.08); }
.stat-name { font-size: 11px; color: var(--muted); margin-bottom: 5px; line-height: 1.35; font-weight: 500; }
.stat-count { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
.stat-pct { font-size: 11px; color: var(--muted); margin-top: 1px; font-weight: 400; }
.stat-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; }
.stat-bar-fill { height: 100%; border-radius: 2px; transition: width .7s ease; }

/* TABLE */
.table-section {
  background: var(--surface-solid); border-radius: 16px; overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,.05), 0 4px 16px rgba(0,0,0,.04);
}
.table-hdr {
  padding: 14px 20px; border-bottom: 1px solid var(--separator);
  display: flex; align-items: center; justify-content: space-between;
}
.table-hdr h3 { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }
.table-hdr p { color: var(--muted); font-size: 12px; }
table { width: 100%; border-collapse: collapse; }
thead th {
  background: var(--surface2); padding: 9px 18px;
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.5px; color: var(--muted);
  text-align: left; border-bottom: 1px solid var(--separator);
}
thead th:not(:first-child) { text-align: center; }
tbody tr { border-bottom: 1px solid var(--separator); transition: background .1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(0,122,255,.03); }
tbody td { padding: 10px 18px; vertical-align: middle; color: var(--text); }
tbody td:not(:first-child) { text-align: center; }
.pill {
  display: inline-block; border-radius: 6px; padding: 3px 10px;
  font-size: 12px; font-weight: 600; min-width: 30px; text-align: center;
}
.empty { padding: 60px; text-align: center; color: var(--muted); }
.empty-icon { font-size: 36px; margin-bottom: 10px; }
</style>
</head>

    const pct=((cnt/total)*100).toFixed(1);
    const c=sc(st);
    return `<div class="stat-card"><div class="stat-name">${st}</div><div class="stat-count" style="color:${c}">${cnt}</div><div class="stat-pct">${pct}% of total</div><div class="stat-bar"><div class="stat-bar-fill" style="width:${pct}%;background:${c}"></div></div></div>`;
  }).join('');

  const rows=sorted.map(([st,cnt])=>{
    const pct=((cnt/total)*100).toFixed(1);
    const c=sc(st);
    return `<tr><td>${st}</td><td><span class="pill" style="color:${c};background:${c}18">${cnt}</span></td><td><div style="display:flex;align-items:center;gap:8px;justify-content:center"><div style="width:90px;height:4px;background:#E5E5EA;border-radius:2px;overflow:hidden"><div style="width:${pct}%;height:100%;background:${c};border-radius:2px"></div></div><span style="color:#8E8E93;font-size:11px;width:38px;text-align:right;font-weight:500">${pct}%</span></div></td></tr>`;
  }).join('');

  document.getElementById('content').innerHTML=`<div class="animate">
    <button class="back-btn" onclick="overview()">‹ All Campaigns</button>
    <div class="camp-header">
      <div>
        <div class="camp-eyebrow"><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${col}"></span>${circle}</div>
        <div class="camp-title">${shortName}</div>
        <div class="camp-meta"><span class="mtag">${src}</span><span class="mtag">📍 ${circle}</span><span class="mtag">🎯 ${sorted.length} statuses</span></div>
      </div>
      <div><div class="camp-total-num">${total}</div><div class="camp-total-label">Total Leads</div></div>
    </div>
    <div class="stat-summary">${cards}</div>
    <div class="table-section">
      <div class="table-hdr"><div><h3>Status Breakdown</h3><p>${sorted.length} statuses · sorted by count</p></div></div>
      <table><thead><tr><th>Status</th><th>Leads</th><th>Distribution</th></tr></thead><tbody>${rows}</tbody></table>
    </div>
  </div>`;
}

function overview(){
  if(activeBid){const old=document.getElementById(activeBid);if(old)old.classList.remove('active');activeBid=null;}
  let cards='';
  for(const[circle,cps] of Object.entries(D)){
    for(const[name,info] of Object.entries(cps)){
      const col=(CC[circle]||{dot:'#8E8E93'}).dot;
      const pct=((info.total/maxTotal)*100).toFixed(0);
      const ic=name.includes('Google')?'🔍':'👤';
      const short=name.replace(/, (Facebook|Google)$/,'');
      const safeC=circle.replace(/'/g,"\\'");
      const safeN=name.replace(/'/g,"\\'");
      cards+=`<div class="ov-card" onclick="show('${safeC}','${safeN}')">
        <div class="ov-circle">${ic} ${circle}</div>
        <div class="ov-name">${short}</div>
        <div class="ov-total" style="color:${col}">${info.total}</div>
        <div class="ov-label">Total Leads</div>
        <div class="ov-bar"><div class="ov-bar-fill" style="width:${pct}%;background:${col}"></div></div>
      </div>`;
    }
  }
  document.getElementById('content').innerHTML=`<div class="animate">
    <div class="section-title">All Campaigns</div>
    <div class="section-sub">Tap any campaign to view the lead status breakdown</div>
    <div class="ov-grid">${cards}</div>
  </div>`;
}
overview();
</script>
</body>
</html>
