services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: mediend_crm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mediend_crm"]
      interval: 10s
      timeout: 5s
      retries: 5

  # App: Next.js + cron endpoints. Env must include CRON_SECRET, VAPID keys for push notifications.
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        DEPLOY_COMMIT: ${DEPLOY_COMMIT:-unknown}
        DEPLOY_TIME: ${DEPLOY_TIME:-unknown}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://workspace.mediend.com}
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - /opt/mediend-crm/mediend-crm2/.env
    depends_on:
      postgres:
        condition: service_healthy

  uptime-kuma:
    image: louislam/uptime-kuma:1
    restart: always
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - uptime-kuma-data:/app/data

  # One-off: run case-stages migration (same env as app, then exit)
  # Usage: docker compose run --rm migrate
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

  # One-off: seed users/employees from JSON and update BD number map
  # Usage: docker compose --profile tools run --rm -v "$(pwd)/csvjson(5).json:/app/csvjson(5).json" seed
  # Or with custom path: docker compose --profile tools run --rm -v "$(pwd)/path/to/file.json:/app/employees.json" seed npx tsx scripts/seed-employees-from-json.ts /app/employees.json
  seed:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools
    entrypoint: ["bun", "run", "scripts/seed-employees-from-json.ts"]
    # Mount JSON and run. Custom path: docker compose run --rm seed -- /app/other.json

  # One-off: sync leads from MySQL
  # Usage: docker compose --profile tools run --rm sync-leads -- --from 2025-01-01
  sync-leads:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools
    entrypoint: ["bun", "run", "scripts/sync-mysql-leads.ts"]

  # One-off: sync historic attendance
  # Usage: docker compose --profile tools run --rm sync-attendance -- --from 2025-01-01
  sync-attendance:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools
    entrypoint: ["bun", "run", "scripts/sync-historic-attendance.ts"]

  # One-off: fix lead circles from MySQL (set circle string from MySQL Circle column)
  # Usage: docker compose --profile tools run --rm fix-lead-circles
  # Dry run: docker compose --profile tools run --rm fix-lead-circles -- --dry-run
  fix-lead-circles:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools
    entrypoint: ["bun", "run", "scripts/fix-lead-circles.ts"]

  # One-off: remap lead category and circle from numeric IDs to text (historic data)
  # Usage: docker compose --profile tools run --rm fix-lead-categories-circles
  # Dry run: docker compose --profile tools run --rm fix-lead-categories-circles -- --dry-run
  fix-lead-categories-circles:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools
    entrypoint: ["bun", "run", "scripts/fix-lead-categories-circles.ts"]

volumes:
  pgdata:
  uptime-kuma-data:
